services:
  api:
    build:
      context: ..
      dockerfile: fixpoint-cloud/docker/Dockerfile
    env_file: ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./railo-cloud.2026-02-21.private-key.pem:/run/secrets/github_app_private_key:ro
      - artifacts:/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: fixpoint-cloud/docker/Dockerfile
    env_file: ./.env
    command: ["python", "-m", "fixpoint_cloud.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./railo-cloud.2026-02-21.private-key.pem:/run/secrets/github_app_private_key:ro
      - artifacts:/artifacts
    healthcheck:
      test: ["CMD", "python", "-m", "fixpoint_cloud.worker_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  migrations:
    build:
      context: ..
      dockerfile: fixpoint-cloud/docker/Dockerfile
    env_file: ./.env
    command: ["python", "-m", "fixpoint_cloud.db.migrate"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file: ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file: ./.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
  artifacts:
